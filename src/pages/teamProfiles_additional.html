<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../utility/volleyball.png" type="image/png">
    <title>Additional Team Profiles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { resize: vertical; }
        button {
            padding: 12px 24px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background: #27ae60; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #2c3e50;
            padding: 12px 24px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .back-link:hover { transform: translateY(-2px); }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .helper-text { font-size: 12px; color: #666; margin-top: 5px; display: block; }
    </style>
    <link rel="stylesheet" href="darkmode.css">
</head>
<body>
    <a href="../../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Back to Main Page
    </a>

    <div class="container">
        <h1>Create Additional Team Group</h1>
        
        <div class="form-group">
            <label for="groupName">Group Name</label>
            <input type="text" id="groupName" placeholder="e.g. Alumni">
            <span class="helper-text">This will create a localStorage key named "{GroupName}Teams" (e.g. AlumniTeams)</span>
        </div>

        <div class="form-group">
            <label for="teamList">Teams List</label>
            <textarea id="teamList" rows="12" placeholder="Team A&#10;Team B&#10;Team C"></textarea>
            <span class="helper-text">Enter one team name per line.</span>
        </div>

        <button onclick="saveGroup()">Create/Update Group</button>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        function saveGroup() {
            const groupName = document.getElementById('groupName').value.trim();
            const teamListRaw = document.getElementById('teamList').value.trim();
            const resultDiv = document.getElementById('result');

            if (!groupName) {
                showResult('Please enter a Group Name.', 'error');
                return;
            }

            if (!teamListRaw) {
                showResult('Please enter at least one team.', 'error');
                return;
            }

            const keyName = `${groupName}Teams`;
            
            const teams = {};
            const lines = teamListRaw.split(/\n+/);

            let count = 0;
            lines.forEach(line => {
                const teamID = line.trim();
                if (teamID) {
                    teams[teamID] = {
                        teamID: teamID,
                        teamName: teamID,
                        games: [],
                        preliminaryScore: 0,
                        preliminaryGroup: groupName,
                        availableDays: [1, 2, 3, 4, 5],
                        additionalTeam: true
                    };
                    count++;
                }
            });

            if (count === 0) {
                showResult('No valid team names found.', 'error');
                return;
            }

            try {
                localStorage.setItem(keyName, JSON.stringify(teams));
                showResult(`Successfully saved ${count} teams to localStorage key "${keyName}".`, 'success');
            } catch (e) {
                console.error(e);
                showResult('Error saving to localStorage. Quota might be exceeded.', 'error');
            }
        }

        function showResult(message, type) {
            const div = document.getElementById('result');
            div.style.display = 'block';
            div.className = `result ${type}`;
            div.textContent = message;
        }
    </script>
</body>
</html>
